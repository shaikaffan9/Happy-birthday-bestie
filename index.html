<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Nida 🎂</title>

<style>
body{
    margin:0;
    padding:0;
    background:linear-gradient(135deg,#ff9a9e,#fad0c4);
    overflow:hidden;
    font-family:Arial,sans-serif;
    text-align:center;
    color:white;
}

.container{
    position:relative;
    top:50%;
    transform:translateY(25%);
}

h1{
    font-size:3rem;
    animation:glow 2s infinite alternate;
}

p{
    font-size:1.3rem;
    padding:0 20px;
}

@keyframes glow{
    from{ text-shadow:0 0 10px white; }
    to{ text-shadow:0 0 30px yellow; }
}

.balloon{
    position:absolute;
    bottom:-150px;
    width:60px;
    height:80px;
    border-radius:50%;
    animation:float 10s infinite;
}

.balloon::after{
    content:"";
    position:absolute;
    width:2px;
    height:80px;
    background:white;
    left:50%;
    top:80px;
}

@keyframes float{
    from{
        transform:translateY(0);
    }
    to{
        transform:translateY(-120vh);
    }
}

button{
    padding:15px 25px;
    border:none;
    border-radius:30px;
    background:white;
    color:#ff4d6d;
    font-size:18px;
    cursor:pointer;
    margin-top:20px;
}

.hidden{
    display:none;
}

#message{
    margin-top:20px;
    font-size:1.4rem;
}
</style>
</head>

<body>

<div class="container">
    <h1>🎂 Happy Birthday Nida 🎂</h1>

    <p>
        Wishing you a day filled with happiness, smiles,
        laughter and lots of shawarma! 🌯✨
    </p>

    <button onclick="showMessage()">
        🎁 Open Your Birthday Gift
    </button>

    <div id="message" class="hidden">
        💖 You are an amazing person and a wonderful friend.
        May this year bring you joy, success and unforgettable memories.
        Happy Birthday! 🎉🎈
    </div>
</div>

    document.body.appendChild(balloon);
}
